name: Count INO Files

on:
  push:

jobs:
  count-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count .ino files
        run: |
          python -c "
          import os
          count = 0
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f.endswith('.ino'):
                      count += 1
          print('Number of .ino files:', count)
          "
